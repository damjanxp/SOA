<div class="tour-form-container">
  <div class="form-header">
    <h1>{{ isEditMode ? 'Edit tour' : 'New tour' }}</h1>
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div class="form-wrapper">
    <form [formGroup]="tourForm" (ngSubmit)="onSubmit()" class="tour-form">
      
      <div class="form-group">
        <label for="name">Tour Name *</label>
        <input 
          type="text" 
          id="name" 
          formControlName="name" 
          class="form-control"
          placeholder="Enter tour name"
        >
        <div *ngIf="name?.invalid && name?.touched" class="error-message">
          <small *ngIf="name?.errors?.['required']">Name is required</small>
          <small *ngIf="name?.errors?.['minlength']">Name must be at least 3 characters long</small>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description *</label>
        <textarea 
          id="description" 
          formControlName="description" 
          class="form-control"
          rows="5"
          placeholder="Enter tour description"
        ></textarea>
        <div *ngIf="description?.invalid && description?.touched" class="error-message">
          <small *ngIf="description?.errors?.['required']">Description is required</small>
          <small *ngIf="description?.errors?.['minlength']">Description must be at least 10 characters long</small>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="difficulty">Difficulty *</label>
          <select id="difficulty" formControlName="difficulty" class="form-control">
            <option *ngFor="let diff of difficulties" [value]="diff">{{ diff }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="lengthKm">Length (km) *</label>
          <input 
            type="number" 
            id="lengthKm" 
            formControlName="lengthKm" 
            class="form-control"
            placeholder="0"
          >
          <div *ngIf="lengthKm?.invalid && lengthKm?.touched" class="error-message">
            <small *ngIf="lengthKm?.errors?.['required']">Length is required</small>
            <small *ngIf="lengthKm?.errors?.['min']">Length cannot be negative</small>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="tags">Tags (comma-separated)</label>
        <input 
          type="text" 
          id="tags" 
          formControlName="tags" 
          class="form-control"
          placeholder="e.g.: hiking, nature, adventure"
        >
        <small class="text-muted">Tags are separated by commas</small>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading || tourForm.invalid">
          {{ loading ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
