<div class="users-container">
  <h2>Korisnici</h2>

  <div *ngIf="loading" class="loading">Učitavanje...</div>

  <div *ngIf="error && !loading" class="error">{{ error }}</div>

  <div *ngIf="!loading && users.length > 0" class="table-wrapper">
    <table class="users-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Korisničko ime</th>
          <th>Email</th>
          <th>Uloga</th>
          <th>Blokiran</th>
          <th>Akcije</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.id }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.role }}</td>
          <td>
            <span *ngIf="user.isBlocked" class="badge blocked">DA</span>

            <ng-container *ngIf="!user.isBlocked && user.role !== 'admin'">
              <span class="badge active">NE</span>
              <button class="block-btn" (click)="blockUser(user)">
                BLOKIRAJ
              </button>
            </ng-container>
          </td>
          <td>
            <ng-container *ngIf="user.id !== myUserId">
              <button
                *ngIf="!followingMap[user.id]"
                class="follow-btn"
                (click)="followUser(user.id)"
              >
                PRATI
              </button>
              <button
                *ngIf="followingMap[user.id]"
                class="unfollow-btn"
                (click)="unfollowUser(user.id)"
              >
                OTPRATI
              </button>
            </ng-container>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && users.length === 0 && !error" class="no-data">
    Nema korisnika
  </div>

  <!-- Recommendations section -->
  <div *ngIf="recommendations.length > 0" class="recommendations-section">
    <h3>Preporučeni korisnici</h3>
    <table class="users-table">
      <thead>
        <tr>
          <th>Korisničko ime</th>
          <th>Zajedničke veze</th>
          <th>Akcije</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rec of recommendations">
          <td>{{ rec.username }}</td>
          <td>{{ rec.mutualCount }}</td>
          <td>
            <button
              *ngIf="!followingMap[rec.userId]"
              class="follow-btn"
              (click)="followUser(rec.userId)"
            >
              PRATI
            </button>
            <span *ngIf="followingMap[rec.userId]" class="badge active">Praćen</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
