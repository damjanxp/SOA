syntax = "proto3";
package stakeholders;
option go_package = "./pb/stakeholders";

service StakeholdersService {
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc GetUserProfile(GetProfileRequest) returns (ProfileResponse);
}

message GetUserRequest {
  string user_id = 1;
}

message GetProfileRequest {
  string user_id = 1;
}

message UserResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  bool is_blocked = 5;
}

message ProfileResponse {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  string profile_image_url = 4;
  string bio = 5;
  string motto = 6;
}

