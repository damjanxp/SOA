services:
  stakeholders-service:
    build: ./stakeholders-service
    ports:
      - "8081:8081"
    env_file:
      - ./stakeholders-service/.env
    environment:
      - DB_HOST=postgres-stakeholders
      - DB_PORT=5432
    depends_on:
      postgres-stakeholders:
        condition: service_healthy
    networks:
      - tourism-network

  postgres-stakeholders:
    image: postgres:16
    environment:
      POSTGRES_DB: stakeholders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tourism-network

  blog-service:
    build: ./blog-service
    ports:
      - "8082:8082"
    env_file:
      - ./blog-service/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/blog_db
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - tourism-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tourism-network

  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j1234
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j1234 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tourism-network

  follower-service:
    build: ./follower-service
    container_name: follower-service
    ports:
      - "8085:8084"
    env_file:
      - ./follower-service/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - tourism-network

  postgres-tours:
    image: postgres:16
    environment:
      POSTGRES_DB: tours_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  tour-service:
    build: ./tour-service
    ports:
      - "8083:8083"
    env_file:
      - ./tour-service/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-tours:5432/tours_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres123
    depends_on:
      postgres-tours:
        condition: service_healthy
    networks:
      - tourism-network

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    env_file:
      - ./gateway/.env
    environment:
      - STAKEHOLDERS_SERVICE_URL=http://stakeholders-service:8081
      - BLOG_SERVICE_URL=http://blog-service:8082
      - FOLLOWER_SERVICE_URL=http://follower-service:8084
      - TOUR_SERVICE_URL=http://tour-service:8083
    depends_on:
      - stakeholders-service
      - blog-service
      - follower-service
      - tour-service
    networks:
      - tourism-network

networks:
  tourism-network:
    driver: bridge
