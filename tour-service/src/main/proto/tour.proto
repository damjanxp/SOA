syntax = "proto3";

package tour;

option java_package = "com.soa.grpc";
option java_outer_classname = "TourProto";
option java_multiple_files = true;

service TourService {
  rpc GetPublishedTours(Empty) returns (ToursResponse);
  rpc GetTourById(GetTourRequest) returns (TourResponse);
  rpc GetTourKeyPoints(GetKeyPointsRequest) returns (GetKeyPointsResponse);
  rpc AddTransportTime(AddTransportTimeRequest) returns (AddTransportTimeResponse);
  rpc PublishTour(PublishTourRequest) returns (TourActionResponse);
  rpc ArchiveTour(TourIdRequest) returns (TourActionResponse);
  rpc ReactivateTour(TourIdRequest) returns (TourActionResponse);
  rpc AddToCart(AddToCartRequest) returns (CartResponse);
  rpc Checkout(CheckoutRequest) returns (CheckoutResponse);
  rpc StartTourExecution (StartTourExecutionRequest) returns (StartTourExecutionResponse);
  rpc CheckNearbyKeyPoint (CheckNearbyKeyPointRequest) returns (CheckNearbyKeyPointResponse);
}

// ── existing messages ────────────────────────────────────────────────────────

message Empty {}

message GetTourRequest {
  string tour_id = 1;
}

message TourResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  string difficulty = 4;
  repeated string tags = 5;
  string status = 6;
  double price = 7;
  double length_km = 8;
}

message ToursResponse {
  repeated TourResponse tours = 1;
}

// ── GetTourKeyPoints ─────────────────────────────────────────────────────────

message GetKeyPointsRequest {
  string tour_id = 1;
  string tourist_id = 2;
}

message KeyPointMessage {
  string id = 1;
  string tour_id = 2;
  string name = 3;
  string description = 4;
  string image_url = 5;
  double lat = 6;
  double lon = 7;
  int32 order_index = 8;
}

message GetKeyPointsResponse {
  repeated KeyPointMessage keypoints = 1;
  bool all_visible = 2;
}

// ── AddTransportTime ─────────────────────────────────────────────────────────

message AddTransportTimeRequest {
  string tour_id = 1;
  string transport_type = 2;
  int32 duration_minutes = 3;
}

message TransportTimeMessage {
  string id = 1;
  string tour_id = 2;
  string transport_type = 3;
  int32 duration_minutes = 4;
}

message AddTransportTimeResponse {
  bool success = 1;
  string message = 2;
  TransportTimeMessage transport_time = 3;
}

// ── PublishTour / ArchiveTour / ReactivateTour messages ───────────────────────

message PublishTourRequest {
  string tour_id = 1;
  string author_id = 2;
}

message TourIdRequest {
  string tour_id = 1;
}

message TourActionResponse {
  bool success = 1;
  string message = 2;
  string tour_id = 3;
  string status = 4;
}

// ── AddToCart / Checkout messages ────────────────────────────────────────────

message AddToCartRequest {
  string tourist_id = 1;
  string tour_id = 2;
}

message OrderItemMessage {
  string id = 1;
  string tour_id = 2;
  string tour_name = 3;
  double price = 4;
  string status = 5;
}

message CartResponse {
  string id = 1;
  string tourist_id = 2;
  repeated OrderItemMessage items = 3;
  double total_price = 4;
  string created_at = 5;
}

message CheckoutRequest {
  string tourist_id = 1;
}

message TourPurchaseTokenMessage {
  string id = 1;
  string tourist_id = 2;
  string tour_id = 3;
  string token = 4;
  string purchased_at = 5;
}

message CheckoutResponse {
  bool success = 1;
  string message = 2;
  repeated TourPurchaseTokenMessage tokens = 3;
}

// ─── Tour Execution messages ───────────────────────────────────────────────

message StartTourExecutionRequest {
  string tourist_id  = 1;
  string tour_id     = 2;
  double start_lat   = 3;
  double start_long  = 4;
}

message StartTourExecutionResponse {
  bool   success      = 1;
  string message      = 2;
  int64  execution_id = 3;
  string status       = 4;
  string started_at   = 5;
}

message CheckNearbyKeyPointRequest {
  int64  execution_id = 1;
  double lat          = 2;
  double lon          = 3;
}

message CheckNearbyKeyPointResponse {
  bool   nearby_found  = 1;
  int64  key_point_id  = 2;   // 0 ako nije pronadjena bliska tacka
  string last_activity = 3;
}

